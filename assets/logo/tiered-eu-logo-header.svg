<svg xmlns="http://www.w3.org/2000/svg" width="560" height="160" viewBox="0 0 560 160" role="img" aria-labelledby="title desc">
  <title id="title">tiered.eu header logo with outline and shadow</title>
  <desc id="desc">Header-specific tiered.eu compass logo using high-contrast tier rings, white text, black outlines, and a hard shadow for dark backgrounds.</desc>
  <defs>
    <filter id="hardShadow" x="-8%" y="-18%" width="116%" height="136%" color-interpolation-filters="sRGB">
      <feDropShadow dx="5" dy="5" stdDeviation="0" flood-color="#000000" flood-opacity="0.62"/>
    </filter>
    <style>
      .wordmark {
        paint-order: stroke fill;
        stroke: #080B0F;
        stroke-width: 8px;
        stroke-linejoin: round;
      }

      .tagline {
        paint-order: stroke fill;
        stroke: #080B0F;
        stroke-width: 4px;
        stroke-linejoin: round;
      }
    </style>
  </defs>
  <rect width="560" height="160" fill="none"/>
  <g filter="url(#hardShadow)">
    <g transform="translate(0 24)">
      <circle cx="56" cy="56" r="56" fill="#080B0F"/>
      <circle cx="56" cy="56" r="54" fill="#FFFFFF"/>
      <circle cx="56" cy="56" r="43" fill="#FFCC00"/>
      <circle cx="56" cy="56" r="32" fill="#72BFD0"/>
      <circle cx="56" cy="56" r="21" fill="#053F70"/>
      <circle cx="56" cy="56" r="10" fill="#02345F"/>
      <path d="M81.5 30.5 65.5 65.5 30.5 81.5 46.5 46.5Z" fill="#02345F" opacity="0.96"/>
      <path d="M65.5 65.5 46.5 46.5" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    </g>
    <g transform="translate(136 48)">
      <text class="wordmark" x="0" y="40" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="54" font-weight="900" letter-spacing="0" fill="#FFFFFF">tiered<tspan fill="#FFCC00">.</tspan><tspan fill="#FFFFFF">eu</tspan></text>
      <text class="tagline" x="2" y="78" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="700" letter-spacing="0" fill="#F8FAFC">Explore a tiered Europe</text>
    </g>
  </g>
</svg>
